name: i2c_midline_no_oled

# Quick-print I²C substrate WITHOUT the OLED: just the ESP32-C3 master
# and the SCD41 + BH1750 sensors on the bus.
#
# Layout note: the devices keep a generous spread so the four I²C nets
# route at the GENEROUS default buffer (1.0 mm) — i.e. every wire channel
# keeps a full 1.0 mm wall to the next channel AND to each sensor recess.
# Cramming the devices closer chokes the pin-approach corridors and forces
# the buffer down (thin, unprintable recess walls), so spacing is sized to
# the routing. The plate is then trimmed to the min-fit rectangle (routed
# extent + edge clearance, snapped to pitch — see the report's `min_size`).
# No `dim.buffer` override here: the default IS the target.

levels:
  - name: base
    perimeter: { center_x: -2.54, center_y: -1.27, width: 71.12, height: 38.1 }
    z_start: -1.5
    z_end: 1.5

# Sensors rotated 180° so their pin rows face north (toward the ESP32's
# bus pins) and their PCB bodies cantilever south. The y offsets land
# every pin row on y ≈ 2 (esp32 centre row), giving one clean east-west
# trunk with short north stubs to each sensor.
devices:
  - { name: u1,     device: esp32_c3_supermini, position: { x: -26, y: 2 } }
  - { name: scd41,  device: scd41,  position: { x: 4,  y: -7.6 },  rotation: 180 }
  - { name: bh1750, device: bh1750, position: { x: 24, y: -5.98 }, rotation: 180 }

buses:
  - { kind: i2c, name: primary, master: u1, slaves: [scd41, bh1750] }
