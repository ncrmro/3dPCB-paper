# Variant of tier2_option2 — SDA highway pushed 1.5 mm further north
# from y=+13.5 to y=+15.0. More clearance from the pedestal north edge
# (+12.0); makes the L1 stub from highway down to OLED pin (J4.SDA at
# y=+10) longer (5 mm vs 3.5 mm) but the channel never gets near the
# pedestal underside until the last 2 mm. Cleaner separation from VCC's
# L1 east-leg at y=+12 (3 mm centers, 2.2 mm walls).

name: tier2_highway_at_fifteen

dim: {}

levels:
  - name: base
    perimeter: { cx: 0.0, cy: 0.0, w: 68.0, h: 50.0 }
    z_start: -1.5
    z_end:   +1.5
  - name: oled_pedestal
    perimeter: { cx: 0.0, cy: 10.0, w: 12.0, h: 4.0 }
    z_start:  +1.5
    z_end:    +4.0

devices:
  - name: esp32
    levels: [0]
    pin_holes: [J1A.5, J1A.6, J1B.1, J1B.2]
  - name: scd41
    levels: [0]
    pin_holes: [J2.1, J2.2, J2.3, J2.4]
  - name: bh1750
    levels: [0]
    pin_holes: [J3.1, J3.2, J3.3, J3.4, J3.5]
  - name: oled
    levels: [1]
    pin_holes: [J4.1, J4.2, J4.3, J4.4]

routes:

  - signal: VCC
    legs:
      - [[-30.0,  -11.92, 1],
         [-25.0,  -11.92, 1],
         [-25.0,  +12.0,  1],
         [ -1.27, +12.0,  1],
         [ -1.27, +10.0,  1]]
      - [[-1.27, +10.0, 2],
         [-1.27,  +6.0, 2]]
      - [[ -1.27,  +6.0,   1],
         [ -1.27, -15.3,   1],
         [ +7.54, -15.3,   1],
         [ +7.54, -17.0,   1]]
      - [[ +7.54, -15.3, 1],
         [+30.16, -15.3, 1],
         [+30.16, -17.0, 1]]

  - signal: GND
    legs:
      - [[-30.0,  -14.46, 1],
         [-22.0,  -14.46, 1],
         [-22.0,   +5.0,  1],
         [ -3.81,  +5.0,  1],
         [ -3.81, +10.0,  1]]
      - [[-3.81, +10.0, 2],
         [-3.81,  +6.0, 2]]
      - [[ -3.81,  +6.0,   1],
         [ -3.81, -22.2,   1],
         [ +5.0,  -22.2,   1],
         [ +5.0,  -17.0,   1]]
      - [[ +5.0,  -22.2, 1],
         [+27.62, -22.2, 1],
         [+27.62, -17.0, 1]]

  - signal: SCL
    legs:
      - [[-12.22, -14.46, 1],
         [-10.0,  -14.46, 1]]
      - [[-10.0, -14.46, 2],
         [-10.0, +17.0,  2],
         [ +1.27, +17.0, 2],
         [ +1.27, +10.0, 2]]
      - [[ +1.27, +17.0,  2],
         [+17.0,  +17.0,  2],
         [+17.0,  -20.6,  2]]
      - [[+17.0,  -20.6, 1],
         [+10.08, -20.6, 1],
         [+10.08, -17.0, 1]]
      - [[+17.0,  -20.6, 1],
         [+25.08, -20.6, 1],
         [+25.08, -17.0, 1]]

  - signal: SDA
    # VARIANT: SDA highway at y=+15 (1.5 mm north of option2's +13.5).
    vias:
      - { x: -8.0, y: -23.6, diameter: 1.5, after_leg: 0 }
      - { x: -8.0, y: +15.0, diameter: 1.5, after_leg: 1 }
    legs:
      - [[-12.22, -17.0,  1],
         [-12.22, -23.6,  1],
         [ -8.0,  -23.6,  1]]
      - [[-8.0, -23.6, 2],
         [-8.0, +15.0, 2]]
      - [[-8.0,  +15.0, 1],
         [+3.81, +15.0, 1],
         [+3.81, +10.0, 1]]
      - [[ -8.0,  -23.6, 1],
         [+22.54, -23.6, 1]]
      # J2.4 per-pin: via offset 1 mm west of pin column for hole_pair_clearance.
      - [[+11.62, -23.6, 2],
         [+11.62, -19.0, 2]]
      - [[+11.62, -19.0, 1],
         [+12.62, -18.0, 1]]
      - [[+12.62, -18.0, 1],
         [+12.62, -17.0, 1]]
      # J3.2 per-pin: same diagonal pattern as J2.4.
      - [[+21.54, -23.6, 2],
         [+21.54, -19.0, 2]]
      - [[+21.54, -19.0, 1],
         [+22.54, -18.0, 1]]
      - [[+22.54, -18.0, 1],
         [+22.54, -17.0, 1]]
