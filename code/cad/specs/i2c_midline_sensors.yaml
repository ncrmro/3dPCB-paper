name: i2c_midline_sensors

# Quick-print I²C substrate WITH the OLED: ESP32-C3 master + SCD41 +
# BH1750 sensors + an SSD1306 OLED on a 4-pin female header.
#
# Same principle as i2c_midline_no_oled: the devices keep a generous
# spread so all four I²C nets route at the GENEROUS default buffer
# (1.0 mm), keeping a full 1.0 mm wall between every channel, every
# sensor recess AND across the OLED branch off the trunk. The OLED's
# extra north branch crowds the SCL/SDA trunk, so this board needs more
# device spread than the no-OLED variant to stay fully clean (every
# cross-net wall ≥ buffer, not just above the half-floor). The plate is
# then trimmed to the min-fit rectangle (routed extent + edge clearance,
# snapped to pitch — see the report's `min_size`). No `dim.buffer`
# override — the default is the target wall thickness.

levels:
  - name: base
    perimeter: { center_x: 2.54, center_y: -2.54, width: 81.28, height: 50.8 }
    z_start: -1.5
    z_end: 1.5

# Sensors rotated 180° (pin rows face north toward the ESP32 bus pins,
# PCBs cantilever south), pin rows landing on y ≈ -4 for one east-west
# trunk. The OLED is header-mounted in the north band (its display PCB
# cantilevers further north off a pedestal — no pocket is carved for it).
devices:
  - { name: u1,     device: esp32_c3_supermini, position: { x: -26, y: -4 } }
  - { name: scd41,  device: scd41,  position: { x: 10, y: -13.6 },  rotation: 180 }
  - { name: bh1750, device: bh1750, position: { x: 32, y: -11.98 }, rotation: 180 }
  - name: oled
    device: oled_ssd1306
    position: { x: 0, y: 16 }
    header: { connector: female_1x4_2.54 }

buses:
  - { kind: i2c, name: primary, master: u1, slaves: [scd41, bh1750, oled] }
