# KiCad gallery manifest (cadeng.yaml shape).
#
# Entries under `models` are populated by hand as `.kicad_pcb` files are
# added to `code/kicad/`. Each model entry should match the basename of
# its `.kicad_pcb`; `bin/prebuild-kicad` stages the corresponding GLB +
# iso PNG into `public/models/kicad/{name}.glb` / `{name}-iso.png`.
project: kicad
models:
  - name: spike
    label: "Spike — bare board"
    camera: iso
  - name: spike-assembly
    label: "Spike — assembled (PCB + ESP32 + SCD41 + BH1750)"
    camera: iso
cameras:
  iso: "0,0,0,-30,0,30,200"
