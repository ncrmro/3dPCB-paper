# Dev orchestration: astro dev server + file watchers that re-stage
# AnchorSCAD and KiCad GLBs into code/web/public/models/ when source
# changes.
#
# Run: `nix develop -c process-compose up` from the repo root.
# Run with TUI disabled: `process-compose up -t=false`.
# Tail logs: `process-compose logs <name> --tail 200 --log-no-color`.

version: "0.5"

# Random port per launch so multiple gallery instances can coexist on
# one host. Reference with `$${WEB_PORT}` (double-dollar) so the shell
# expands at process spawn, not at YAML parse. The `url:` process below
# prints the resolved port once the readiness probe passes.
env_cmds:
  WEB_PORT: "shuf -i 10000-60000 -n 1"

# process-compose's own HTTP API stays on (default :8080) so the
# dependency graph at http://127.0.0.1:8080/graph and the web TUI
# remain available. The earlier `PC_NO_SERVER=1` line lived in the
# YAML's `environment:` block, which sets vars for spawned processes
# — process-compose reads PC_NO_SERVER from its OWN env at launch,
# so the line was a no-op. Removed to avoid the false implication.
# To actually disable the API: `process-compose up --no-server`,
# or `--use-uds` for a Unix-socket-only mode.

processes:
  # ---------------------------------------------------------------
  # One-shot CAD stage: required before the dev server starts so the
  # first page load already has substrate/vitamin GLBs.
  # ---------------------------------------------------------------
  prebuild-cad:
    command: bash code/web/bin/prebuild-cad
    availability:
      restart: "no"

  # ---------------------------------------------------------------
  # One-shot KiCad stage: best-effort. Runs in the kicad flake so
  # kicad-cli is on PATH. Decoupled from `web` so a board-load failure
  # (e.g. pre-existing project state) doesn't keep the gallery down —
  # the previously-staged spike.glb / iso PNG remain usable.
  # ---------------------------------------------------------------
  prebuild-kicad:
    command: nix develop ./code/kicad --command bash code/web/bin/prebuild-kicad
    availability:
      restart: "no"

  # ---------------------------------------------------------------
  # One-shot: install the bun workspace deps. `bun install` from a
  # workspace member resolves the workspace at code/package.json and
  # symlinks `astro` etc. into the hoisted node_modules. Without this
  # `bun run dev` crashes with "astro: command not found" on a fresh
  # checkout. No-op when node_modules is already up to date.
  # ---------------------------------------------------------------
  web-deps:
    working_dir: code/web
    command: nix develop --command bun install
    availability:
      restart: "no"

  # ---------------------------------------------------------------
  # Astro dev server. Vite picks up changes under code/web/public/
  # so the watchers below can update GLBs in-place.
  # ---------------------------------------------------------------
  web:
    working_dir: code/web
    command: nix develop --command bun run dev -- --port $${WEB_PORT} --host 0.0.0.0
    depends_on:
      web-deps:
        condition: process_completed_successfully
      prebuild-cad:
        condition: process_completed_successfully
    availability:
      restart: on_failure
      backoff_seconds: 2
    readiness_probe:
      http_get:
        host: 127.0.0.1
        scheme: http
        port: $${WEB_PORT}
        path: /
      period_seconds: 2
      failure_threshold: 60

  # ---------------------------------------------------------------
  # One-shot banner: prints the URL once the readiness probe passes
  # so the port is easy to spot in the log stream (or TUI). Astro
  # also logs the URL itself, but this gives a single grep-able line.
  # ---------------------------------------------------------------
  url:
    command: |
      printf '\n  → 3dPCB-paper gallery: http://127.0.0.1:%s/\n\n' "$${WEB_PORT}"
    depends_on:
      web:
        condition: process_healthy
    availability:
      restart: "no"

  # ---------------------------------------------------------------
  # CRITICAL: watchexec --postpone skips the initial fire so we don't
  # duplicate the prebuild step. The 500ms debounce coalesces saves
  # from editors that touch files multiple times in a row.
  # ---------------------------------------------------------------
  watch-cad:
    command: nix develop --command watchexec --watch code/cad/src --exts py --postpone --debounce 500ms -- bash code/web/bin/prebuild-cad
    depends_on:
      web:
        condition: process_started

  # ---------------------------------------------------------------
  # KiCad watcher runs inside the kicad flake so render-board and
  # render-glb find kicad-cli on PATH. Watches both .kicad_pcb and
  # .kicad_sch so a schematic change re-renders the board too.
  # ---------------------------------------------------------------
  watch-kicad:
    command: nix develop ./code/kicad --command watchexec --watch code/kicad --exts kicad_pcb,kicad_sch --postpone --debounce 500ms -- bash code/web/bin/prebuild-kicad
    depends_on:
      web:
        condition: process_started
